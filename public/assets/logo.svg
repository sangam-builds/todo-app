<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" fill="none" class="taskflow-logo-svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="glossGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Glow effect handled by CSS, but background box here -->
  <rect class="logo-box" width="32" height="32" rx="9" fill="url(#logoGrad)" />
  
  <!-- Inner gloss reflection -->
  <path d="M0 9C0 4.02944 4.02944 0 9 0H23C27.9706 0 32 4.02944 32 9V16C32 16 24 18 16 16C8 14 0 16 0 16V9Z" fill="url(#glossGrad)" opacity="0.5" />
  
  <!-- Animated Checkmark path -->
  <path class="logo-checkmark" d="M9.5 16.5L13.5 20.5L22.5 11.5" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
</svg>
